# Publica una versión nueva cuando se sube un tag vX.Y.Z.
#
# Flujo del dueño (3 comandos, ver README):
#   npm version patch
#   git push --follow-tags
#   → GitHub Actions construye el instalador y lo publica en Releases.

name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
